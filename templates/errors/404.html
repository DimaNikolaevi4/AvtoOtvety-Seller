{% extends "base.html" %}

{% block title %}Страница не найдена - 404{% endblock %}

{% block content %}
<div class="container text-center mt-5 py-5">
    <div class="error-page">
        <h1 class="display-1 text-danger">404</h1>
        <h2 class="mb-4">Страница не найдена</h2>
        <p class="lead text-muted mb-4">
            Упс! Страница, которую вы ищете, не существует или была перемещена.
        </p>
        <div class="mt-4">
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg me-2">
                Вернуться на главную
            </a>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-lg">
                Перейти в кабинет
            </a>
        </div>
    </div>
</div>

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/errors.css') }}">
{% endblock %}
