{% extends "admin/base_admin.html" %}

{% block title %}Вход в админку{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0 text-center">🔐 Вход в админ-панель</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin_login') }}">
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль администратора</label>
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               name="password" 
                               placeholder="Введите пароль из ADMIN_PASSWORD"
                               required 
                               autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        🔑 Войти
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <a href="{{ url_for('index') }}" class="text-decoration-none">
                        ← Вернуться на главную
                    </a>
                </div>
            </div>
        </div>
        
        <div class="alert alert-info mt-3">
            <small>
                ℹ️ Пароль администратора задаётся в переменной окружения 
                <code>ADMIN_PASSWORD</code> (файл .env)
            </small>
        </div>
    </div>
</div>
{% endblock %}
